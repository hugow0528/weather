name: Weather Bot Cron

on:
  schedule:
    # GitHub 使用 UTC 時間。香港時間 - 8小時
    # 5:00 AM HKT = 21:00 UTC (前一天)
    # 9:00 PM HKT = 13:00 UTC
    - cron: '0 13,21 * * *'
  workflow_dispatch: # 允許手動點擊執行

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests

      - name: Run bot
        run: python weather_bot.py
