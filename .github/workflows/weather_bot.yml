name: Humanized Weather Bot

on:
  schedule:
    - cron: '0 21 * * *' # 香港早上 5:00
    - cron: '0 13 * * *' # 香港晚上 9:00
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          persist-credentials: true # 允許推送回 Repo

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: pip install requests pytz

      - name: Run Script
        run: python weather_script.py

      - name: Commit and Push Subscriber Changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add subscribers.txt
          git commit -m "Update subscribers list [skip ci]" || echo "No changes to commit"
          git push
