name: Daily Weather Bot

on:
  schedule:
    - cron: '0 13 * * *' # 21:00 HK
    - cron: '0 21 * * *' # 05:00 HK
  workflow_dispatch:

jobs:
  run_bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests pytz

      - name: Run Script
        run: python weather_script.py

      - name: Commit and Push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add subscribers.txt
          git diff --quiet && git diff --staged --quiet || git commit -m "Update subscribers"
          git push
