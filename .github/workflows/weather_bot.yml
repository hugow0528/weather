name: Daily Weather Bot

on:
  schedule:
    # 記得 GitHub 用的是 UTC 時間 (香港時間 -8)
    # 晚上 9:00 PM HK = 13:00 UTC
    # 早上 5:00 AM HK = 21:00 UTC
    - cron: '0 13 * * *'
    - cron: '0 21 * * *'
  workflow_dispatch: # 允許手動掣

jobs:
  run_bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests pytz

      - name: Run Weather Script
        run: python weather_script.py
